<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIFR LEDGER | ANALYST COMMAND</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --neon: #00ffcc; --bg: #050505; --card: #111; --border: #222; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; overflow-x: hidden; }
        
        .nav-tabs { display: flex; background: #000; border-bottom: 1px solid var(--neon); position: sticky; top: 0; z-index: 9999; }
        .tab { padding: 15px 25px; cursor: pointer; color: #555; font-size: 11px; font-weight: bold; letter-spacing: 2px; border-bottom: 2px solid transparent; }
        .tab.active { color: var(--neon); border-bottom: 2px solid var(--neon); background: rgba(0, 255, 204, 0.05); }

        .ticker-wrap { background: #000; border-bottom: 1px solid #111; padding: 10px 0; overflow: hidden; white-space: nowrap; }
        .ticker { display: inline-block; animation: marquee 60s linear infinite; color: var(--neon); font-size: 10px; text-transform: uppercase; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .page { padding: 20px; max-width: 1600px; margin: 0 auto; display: none; }
        .page.active { display: block; }

        /* Dashboard Layout - 3 Column Forensic View */
        .analytics-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 30px; background: #0a0a0a; padding: 20px; border: 1px solid var(--border); }
        .list-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
        
        .scroll-box { max-height: 500px; overflow-y: auto; padding-right: 10px; border-top: 1px solid #222; padding-top: 15px; scrollbar-width: thin; scrollbar-color: var(--neon) #111; }
        .scroll-box::-webkit-scrollbar { width: 4px; }
        .scroll-box::-webkit-scrollbar-thumb { background: var(--neon); }

        .card { background: var(--card); border: 1px solid var(--border); padding: 12px; margin-bottom: 12px; border-left: 2px solid #333; position: relative; font-size: 12px; }
        .flag-icon { width: 14px; height: 10px; margin-right: 8px; vertical-align: middle; }
        .sector-badge { font-size: 8px; padding: 2px 5px; border: 1px solid; text-transform: uppercase; float: right; font-weight: bold; }
        .stat { color: var(--neon); font-size: 11px; font-weight: bold; }
        
        .news-card { background: #080808; border: 1px solid #111; padding: 10px; margin-bottom: 10px; font-size: 11px; }
        .news-tag { color: var(--neon); font-weight: bold; margin-right: 5px; }

        .intel-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; }
        .intel-card { background: #111; padding: 25px; border: 1px solid #222; font-size: 13px; color: #aaa; }
        
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <div class="nav-tabs">
        <div class="tab active" onclick="show('terminal')">TERMINAL_COMMAND</div>
        <div class="tab" onclick="show('intelligence')">STRATEGY_INTELLIGENCE</div>
    </div>

    <div class="ticker-wrap">
        <div class="ticker">
            GCC_RVCMC: $22.40 ▲ 1.4% // TECH_REMOVAL (CORC): $175.00 ▲ 2.8% // UAE_BLUE_CARBON: $18.50 ▲ 0.9% // SIFR_PREMIUM: $35.40 ▲ 4.2% // CCS_HUB_FID: ACTIVE //
        </div>
    </div>

    <div id="terminal" class="page active">
        <div class="analytics-grid">
            <div style="height:300px;"><canvas id="pathwayChart"></canvas></div>
            <div style="height:300px;"><canvas id="hubChart"></canvas></div> <div style="height:300px;"><canvas id="sectorChart"></canvas></div>
        </div>
        <div class="list-grid">
            <div><h2 style="font-size:10px; color:#555;">[01] TRANSACTION_LEDGER</h2><div class="scroll-box" id="tList"></div></div>
            <div><h2 style="font-size:10px; color:#555;">[02] ASSET_INVENTORY</h2><div class="scroll-box" id="pList"></div></div>
            <div><h2 style="font-size:10px; color:#555;">[03] LATEST_MARKET_INTEL</h2><div class="scroll-box" id="nList"></div></div> </div>
    </div>

    <div id="intelligence" class="page">
        <div class="intel-grid" id="iCont"></div>
    </div>

    <script>
        const url = "https://script.google.com/macros/s/AKfycbxmJjcV2RYOSEMj7qKKScQn_SAsrgtuEZgeFDsEQ3t0_YuOHnNNiVTllDAA0OFq27N3/exec";
        const countryIso = { 'UAE':'ae','Saudi Arabia':'sa','KSA':'sa','Oman':'om','Qatar':'qa','Kuwait':'kw','UK':'gb','USA':'us','Kenya':'ke','Tanzania':'tz' };

        function show(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        async function init() {
            try {
                const res = await fetch(url);
                const data = await res.json();
                let perm=0, dec=0, sectors={}, hubs={};

                // 

[Image of the carbon cycle]

                data.projects.forEach(p => {
                    const isPerm = (p.Permanence || '').includes('Permanent');
                    isPerm ? perm++ : dec++;
                    hubs[p.Country] = (hubs[p.Country] || 0) + 1;
                    document.getElementById('pList').innerHTML += `<div class="card" style="border-left-color:${isPerm?'#00bcff':'#00ff66'}"><div style="font-size:9px; color:#555"><img class="flag-icon" src="https://flagcdn.com/w20/${countryIso[p.Country]||'un'}.png"> ${p.Country}</div><b>${p.Project_Name}</b><br><span class="stat">${p.Tech_Pathway}</span></div>`;
                });

                data.transactions.forEach(t => {
                    sectors[t.Sector] = (sectors[t.Sector] || 0) + 1;
                    document.getElementById('tList').innerHTML += `<div class="card"><div style="font-size:9px; color:#555">${t.Date}</div><b>${t.Buyer}</b><div style="font-size:9px; margin-top:5px; border-top:1px solid #1a1a1a; padding-top:5px;"><img class="flag-icon" src="https://flagcdn.com/w20/${countryIso[t.Buyer_Country]||'un'}.png"> ${t.Buyer_Country} ← ${t.Seller}</div></div>`;
                });

                // 
                data.news.forEach(n => {
                    document.getElementById('nList').innerHTML += `<div class="news-card"><span class="news-tag">[${n.Region_Tag || 'GLOBAL'}]</span> <a href="${n.URL}" target="_blank" style="color:#eee; text-decoration:none;">${n.Headline}</a><div style="font-size:8px; color:#444; margin-top:5px;">SOURCE: ${n.Source}</div></div>`;
                });

                data.intelligence.forEach(i => {
                    document.getElementById('iCont').innerHTML += `<div class="intel-card"><h3>${i.Entity}</h3><p><b>Strategy:</b> ${i.Strategy}</p><p><b>Behavior:</b> ${i.Behavior}</p></div>`;
                });

                // Charts Logic
                new Chart(document.getElementById('pathwayChart'), { type:'doughnut', data:{ labels:['Permanent','Decadal'], datasets:[{data:[perm,dec], backgroundColor:['#00bcff','#00ff66'], borderWidth:0}] }, options:{ cutout:'85%', plugins:{ title:{display:true, text:'QUALITY_SPLIT', color:'#fff'} } }});
                new Chart(document.getElementById('hubChart'), { type:'bar', data:{ labels:Object.keys(hubs), datasets:[{data:Object.values(hubs), backgroundColor:'#00ffcc'}] }, options:{ plugins:{ title:{display:true, text:'REGIONAL_HUB_DENSITY', color:'#fff'} }, scales:{ y:{ticks:{color:'#555'}}, x:{ticks:{color:'#555'}} } }});
                new Chart(document.getElementById('sectorChart'), { type:'bar', data:{ labels:Object.keys(sectors), datasets:[{data:Object.values(sectors), backgroundColor:'#9944ff'}] }, options:{ indexAxis:'y', plugins:{ title:{display:true, text:'SECTOR_DYNAMICS', color:'#fff'} }, scales:{ x:{display:false}, y:{ticks:{color:'#555'}} } }});

            } catch (e) { console.error("SIFR_ERROR:", e); }
        }
        window.onload = init;
    </script>
</body>
</html>
