<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>SIFR LEDGER | ANALYST TERMINAL</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --neon: #00ffcc; --bg: #050505; --card: #111; --border: #222; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Courier New', monospace; margin: 0; }
        .nav { display: flex; background: #000; border-bottom: 1px solid var(--neon); position: sticky; top: 0; z-index: 99; }
        .tab { padding: 15px 25px; cursor: pointer; color: #555; font-size: 11px; font-weight: bold; letter-spacing: 2px; }
        .tab.active { color: var(--neon); border-bottom: 2px solid var(--neon); background: rgba(0,255,204,0.05); }
        .ticker-wrap { background: #000; border-bottom: 1px solid #111; padding: 10px 0; overflow: hidden; white-space: nowrap; }
        .ticker { display: inline-block; animation: marquee 60s linear infinite; color: var(--neon); font-size: 10px; }
        .index-strip { background: #0a0a0a; display: flex; gap: 40px; padding: 12px 25px; border-bottom: 1px solid #111; font-size: 11px; }
        .page { padding: 20px; max-width: 1600px; margin: 0 auto; display: none; }
        .page.active { display: block; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
        .scroll { max-height: 550px; overflow-y: auto; border-top: 1px solid #222; padding-top: 15px; scrollbar-width: thin; scrollbar-color: var(--neon) #111; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 15px; margin-bottom: 12px; border-left: 2px solid #333; position: relative; }
        .risk { position: absolute; top: 15px; right: 15px; color: var(--neon); font-weight: bold; font-size: 12px; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>
    <div class="nav">
        <div class="tab active" onclick="show('term')">TERMINAL_COMMAND</div>
        <div class="tab" onclick="show('intel')">STRATEGIC_INTELLIGENCE</div>
    </div>
    <div class="ticker-wrap"><div class="ticker">SIFR_MARKET_INDEX: $150.00 PERMANENT // $25.00 DECADAL // ARABIA_CCS_HUB: ACTIVE // NEOM_DAC_PILOT: FID_REACHED //</div></div>
    <div class="index-strip">
        <div>TOTAL_VALUE: <b id="v-val">$0.00M</b></div>
        <div>CAPACITY: <b id="v-cap">0.00 Mtpa</b></div>
        <div>DEFICIT: <b id="v-def" style="color:#ff4400">0.00 Mtpa</b></div>
    </div>
    <div id="term" class="page active">
        <div class="grid" style="margin-bottom:30px;">
            <div style="height:280px;"><canvas id="c1"></canvas></div>
            <div style="height:280px;"><canvas id="c2"></canvas></div>
            <div style="height:280px;"><canvas id="c3"></canvas></div>
        </div>
        <div class="grid">
            <div><h2 style="font-size:10px; color:#555;">[01] TRANSACTION_LEDGER</h2><div class="scroll" id="tList"></div></div>
            <div><h2 style="font-size:10px; color:#555;">[02] PROJECTS</h2><div class="scroll" id="pList"></div></div>
            <div><h2 style="font-size:10px; color:#555;">[03] MARKET_INTEL_NEWS</h2><div class="scroll" id="nList"></div></div>
        </div>
    </div>
    <div id="intel" class="page"><div id="iCont" class="grid"></div></div>

    <script>
        const url = "https://script.google.com/macros/s/AKfycbytjDbcbqLGsTvIedmLEzRdi6tlQvG0sZJccM9eCLHB0GpeHJ8J-72PJK0TgflYILyF/exec"; 
        const iso = { 'UAE':'ae','Saudi Arabia':'sa','KSA':'sa','Oman':'om','Qatar':'qa','Kuwait':'kw','UK':'gb','USA':'us' };

        function show(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        async function init() {
            try {
                const res = await fetch(url, { redirect: "follow" });
                const data = await res.json();
                let perm=0, dec=0, tVal=0, cap=0, dem=0, sectors={}, hubs={};

                // 
                (data.projects || []).forEach(p => {
                    const isP = p.Perm.includes('Perm'); isP ? perm++ : dec++;
                    hubs[p.Country] = (hubs[p.Country] || 0) + 1;
                    const c = parseFloat(p.Capacity.toString().replace(/[^\d.]/g, '')) || 0; cap += c;
                    document.getElementById('pList').innerHTML += `<div class="card" style="border-left-color:${isP?'#00bcff':'#00ff66'}"><div class="risk">${p.Score || (isP?9.8:6.4)}</div><div style="font-size:9px; color:#555;"><img style="width:14px;" src="https://flagcdn.com/w20/${iso[p.Country]||'un'}.png"> ${p.Country}</div><b>${p.Entity}</b><br><span style="font-size:9px;color:#888">${p.Tech}</span></div>`;
                });

                (data.transactions || []).forEach(t => {
                    sectors[t.Sector] = (sectors[t.Sector] || 0) + 1;
                    const v = parseFloat(t.Volume.toString().replace(/,/g,'')) || 0;
                    tVal += (v * (t.Sector === 'Aviation' ? 25 : 150)); dem += (v / 1e6);
                    document.getElementById('tList').innerHTML += `<div class="card"><div style="font-size:9px;color:#555">${t.Date}</div><b>${t.Buyer}</b><div style="font-size:9px;border-top:1px solid #222;margin-top:8px;padding-top:8px;"><img style="width:14px;" src="https://flagcdn.com/w20/${iso[t.B_Country]||'un'}.png"> ${t.B_Country} ← ${t.Seller}</div></div>`;
                });

                (data.news || []).forEach(n => {
                    document.getElementById('nList').innerHTML += `<div style="background:#080808;padding:12px;margin-bottom:10px;border-left:2px solid var(--neon);font-size:11px;"><span style="color:var(--neon)">[${n.Region}]</span> <a href="${n.URL}" target="_blank" style="color:#eee;text-decoration:none;">${n.Headline}</a></div>`;
                });

                (data.intel || []).forEach(i => {
                    document.getElementById('iCont').innerHTML += `<div class="card" style="background:#111;"><h3>${i.Entity}</h3><p style="font-size:12px;color:#888;"><b>Strategy:</b> ${i.Strategy}<br><br><b>Behavior:</b> ${i.Behavior}</p></div>`;
                });

                document.getElementById('v-val').innerText = `$${(tVal/1e6).toFixed(2)}M`;
                document.getElementById('v-cap').innerText = `${cap.toFixed(2)} Mtpa`;
                document.getElementById('v-def').innerText = `${Math.max(0, dem-cap).toFixed(2)} Mtpa`;

                new Chart(document.getElementById('c1'), { type:'doughnut', data:{ labels:['Permanent','Decadal'], datasets:[{data:[perm,dec], backgroundColor:['#00bcff','#00ff66'], borderWidth:0}] }, options:{ cutout:'85%', plugins:{title:{display:true,text:'QUALITY_SPLIT',color:'#fff'}} }});
                new Chart(document.getElementById('c2'), { type:'bar', data:{ labels:Object.keys(hubs), datasets:[{data:Object.values(hubs), backgroundColor:'#00ffcc'}] }, options:{ plugins:{title:{display:true,text:'PROJECT_GEOGRAPHY',color:'#fff'}} }});
                new Chart(document.getElementById('c3'), { type:'bar', data:{ labels:Object.keys(sectors), datasets:[{data:Object.values(sectors), backgroundColor:'#9944ff'}] }, options:{ indexAxis:'y', plugins:{title:{display:true,text:'SECTOR_DYNAMICS',color:'#fff'}} }});
            } catch (e) { console.error("SIFR_ERROR:", e); }
        }
        window.onload = init;
    </script>
</body>
</html>
